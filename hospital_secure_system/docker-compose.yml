services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks: [hospital_net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file: .env
    ports:
      - "15672:15672"
    networks: [hospital_net]

  auth-service:
    build: ./services/auth-service
    env_file: .env
    depends_on: [postgres]
    networks: [hospital_net]

  patient-service:
    build: ./services/patient-service
    env_file: .env
    depends_on: [postgres, auth-service]
    networks: [hospital_net]

  record-service:
    build: ./services/record-service
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on: [postgres, rabbitmq, auth-service]
    networks: [hospital_net]

  audit-service:
    build: ./services/audit-service
    env_file: .env
    depends_on: [postgres]
    networks: [hospital_net]

  worker-service:
    build: ./services/worker-service
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on: [postgres, rabbitmq]
    networks: [hospital_net]

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./dashboard:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on: [auth-service, patient-service, record-service, audit-service]
    networks: [hospital_net]

volumes:
  postgres_data:

networks:
  hospital_net:
    driver: bridge