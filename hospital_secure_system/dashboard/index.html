<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hospital Management Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--red:#d71920;--red2:#b90f17;--dark:#17202a;--muted:#667085;--line:#eef1f5;--bg:#f7f9fc;--ok:#0f9f6e;--bad:#dc2626;--warn:#b7791f;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#fff 0%,#fff 40%,#fff5f5 100%);color:var(--dark)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.shell{min-height:100vh}.loginPage{min-height:100vh;display:grid;grid-template-columns:1fr 1.1fr}.brandSide{background:linear-gradient(140deg,var(--red),#8f0710);color:#fff;padding:54px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.brandSide:before{content:"";position:absolute;width:420px;height:420px;border:60px solid rgba(255,255,255,.12);border-radius:50%;right:-140px;top:-120px}.brandTitle{position:relative}.logo{display:flex;align-items:center;gap:14px;font-weight:900;font-size:28px}.cross{width:54px;height:54px;border-radius:16px;background:#fff;position:relative;box-shadow:0 20px 45px rgba(0,0,0,.22)}.cross:before,.cross:after{content:"";position:absolute;background:var(--red);border-radius:5px}.cross:before{width:28px;height:10px;left:13px;top:22px}.cross:after{height:28px;width:10px;left:22px;top:13px}.brandSide h1{font-size:52px;line-height:1.02;margin:60px 0 18px}.brandSide p{font-size:18px;opacity:.88;max-width:570px;line-height:1.7}.loginCard{display:flex;align-items:center;justify-content:center;padding:42px}.authBox{width:100%;max-width:470px;background:#fff;border:1px solid var(--line);border-radius:30px;box-shadow:0 24px 80px rgba(20,40,80,.12);padding:34px;animation:rise .55s ease}.authBox h2{font-size:30px;margin:0 0 8px}.sub{color:var(--muted);line-height:1.55;margin:0 0 22px}.tabs{display:flex;background:#f1f4f8;border-radius:16px;padding:5px;margin-bottom:18px}.tabs button{flex:1;padding:12px;border-radius:12px;color:var(--muted);background:transparent;font-weight:800}.tabs button.active{background:#fff;color:var(--red);box-shadow:0 8px 20px rgba(0,0,0,.08)}.form{display:grid;gap:13px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:7px;color:#344054}.field input,.field select,.field textarea{width:100%;padding:14px;border:1px solid #d8dee8;border-radius:15px;background:#fff;outline:0;transition:.2s}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(215,25,32,.09)}.btn{padding:13px 17px;border-radius:15px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s}.btn:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,var(--red),var(--red2));color:white;box-shadow:0 12px 24px rgba(215,25,32,.22)}.secondary{background:#fff;color:var(--red);border:1px solid #ffd1d4}.ghost{background:#f5f7fb;color:#344054}.danger{background:#fff1f2;color:var(--bad);border:1px solid #fecdd3}.topbar{height:78px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:5}.userBadge{display:flex;align-items:center;gap:12px;background:#fafafa;border:1px solid var(--line);padding:9px 12px;border-radius:18px}.avatar{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;display:grid;place-items:center;font-weight:900}.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 78px)}.side{background:#fff;border-right:1px solid var(--line);padding:22px}.nav{display:grid;gap:8px}.nav button{padding:13px 14px;border-radius:15px;text-align:left;background:transparent;color:#475467;font-weight:800}.nav button.active,.nav button:hover{background:#fff1f2;color:var(--red)}.main{padding:26px;animation:fade .35s ease}.hero{background:linear-gradient(135deg,#fff,#fff4f4);border:1px solid #ffe0e2;border-radius:30px;padding:28px;margin-bottom:22px;display:flex;justify-content:space-between;gap:18px}.hero h1{margin:0;font-size:32px}.hero p{margin:10px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 50px rgba(29,41,57,.06);padding:20px;margin-bottom:18px;animation:rise .35s ease}.stat{padding:20px}.stat small{color:var(--muted);font-weight:800}.stat strong{display:block;font-size:34px;margin-top:8px}.stack{display:grid;gap:13px}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.tableWrap{overflow:auto;border-radius:18px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:#fff}th,td{text-align:left;padding:13px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}th{background:#fafafa;color:#475467;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.pill{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900}.pill.ok{background:#ecfdf3;color:var(--ok)}.pill.bad{background:#fef2f2;color:var(--bad)}.pill.warn{background:#fffbeb;color:var(--warn)}.notice{border-radius:18px;padding:14px 16px;margin-bottom:14px;font-weight:750}.notice.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}.notice.ok{background:#ecfdf3;color:#027a48;border:1px solid #bbf7d0}.empty{padding:28px;text-align:center;color:var(--muted);background:#fafafa;border-radius:18px}.fieldError{color:#b42318;font-size:12px;font-weight:750;margin-top:6px}.sectionTitle{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.sectionTitle h3{margin:0}.muted{color:var(--muted)}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes fade{from{opacity:.4}to{opacity:1}}@media(max-width:1050px){.loginPage,.layout,.two{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line)}.grid{grid-template-columns:repeat(2,1fr)}.brandSide{display:none}}@media(max-width:620px){.grid{grid-template-columns:1fr}.topbar{height:auto;gap:12px;align-items:flex-start;flex-direction:column;padding:16px}.main{padding:16px}.authBox{padding:22px;border-radius:22px}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
const tokenKey='hospital_token';
function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))}catch{return {}}}
function friendlyError(e){const data=e?.data;if(data?.error){const lines=[data.error.message,...(data.error.fields||[]).map(f=>`${f.field}: ${f.message}`)];return lines.join('\n')}return e?.message||'Request failed. Please try again.'}
const api={token:()=>localStorage.getItem(tokenKey),async req(path,opts={}){const headers=opts.body instanceof FormData?{}:{'Content-Type':'application/json'};if(api.token())headers.Authorization='Bearer '+api.token();const r=await fetch(path,{...opts,headers:{...headers,...(opts.headers||{})}});let data=null;const ct=r.headers.get('content-type')||'';if(ct.includes('application/json'))data=await r.json();else data=await r.text();if(!r.ok){let err=new Error(typeof data==='string'?data:(data?.error?.message||'Request failed'));err.data=data;throw err}return data?.data??data}}
function App(){const [user,setUser]=useState(null),[view,setView]=useState('overview'),[msg,setMsg]=useState(''),[err,setErr]=useState(''),[data,setData]=useState({patients:[],doctors:[],appointments:[],records:[],metrics:{},users:[],logs:[]});
useEffect(()=>{const u=new URL(location.href);const tok=u.searchParams.get('token');if(tok){localStorage.setItem(tokenKey,tok);history.replaceState({},'',location.pathname);}},[]);
useEffect(()=>{if(api.token()) loadMe();},[]);
async function loadMe(){try{const me=await api.req('/api/auth/me');setUser(me);await loadAll(me.role)}catch{localStorage.removeItem(tokenKey);setUser(null)}}
async function loadAll(role=user?.role){try{const [patients,doctors,appointments,records]=await Promise.all([api.req('/api/patients/'),api.req('/api/patients/doctors/list'),api.req('/api/patients/appointments/list'),api.req('/api/records/')]);let extra={};if(role==='admin'){const [metrics,users,logs]=await Promise.all([api.req('/api/audit/metrics'),api.req('/api/auth/admin/users'),api.req('/api/audit/logs')]);extra={metrics,users,logs}}setData({patients,doctors,appointments,records,metrics:extra.metrics||{},users:extra.users||[],logs:extra.logs||[]})}catch(e){setErr(friendlyError(e))}}
function logout(){localStorage.removeItem(tokenKey);setUser(null);setView('overview');setMsg('');setErr('')}
if(!user) return <Login onDone={async()=>{await loadMe();setMsg('Welcome back.')}}/>;
const nav=['overview','patients','appointments','records',...(user.role==='admin'?['admin']:[])];
return <div className="shell"><header className="topbar"><div className="logo"><span className="cross"></span><span>Hospital Management</span></div><div className="userBadge"><div className="avatar">{(user.full_name||user.email||'U')[0].toUpperCase()}</div><div><b>{user.full_name||user.email}</b><div className="muted">{user.role==='admin'?'Administrator':'Hospital User'}</div></div><button className="btn ghost" onClick={logout}>Sign out</button></div></header><div className="layout"><aside className="side"><div className="nav">{nav.map(n=><button key={n} className={view===n?'active':''} onClick={()=>{setView(n);setErr('');setMsg('')}}>{label(n)}</button>)}</div></aside><main className="main">{err&&<div className="notice err">{err.split('\n').map((x,i)=><div key={i}>{x}</div>)}</div>}{msg&&<div className="notice ok">{msg}</div>}<Page view={view} user={user} data={data} load={loadAll} setMsg={setMsg} setErr={setErr}/></main></div></div>}
function label(v){return {overview:'Overview',patients:'Patients',appointments:'Appointments',records:'Medical Records',admin:'Admin Center'}[v]}
function Login({onDone}){const [mode,setMode]=useState('login'),[f,setF]=useState({email:'',password:'',full_name:'',role:'user'}),[err,setErr]=useState(''),[busy,setBusy]=useState(false);async function submit(){setBusy(true);setErr('');try{const path=mode==='login'?'/api/auth/login':'/api/auth/register';const body=mode==='login'?{email:f.email,password:f.password}:f;const res=await api.req(path,{method:'POST',body:JSON.stringify(body)});if(mode==='register'){setMode('login');setErr('Account created successfully. Please sign in.')}else{localStorage.setItem(tokenKey,res.access_token);await onDone()}}catch(e){setErr(friendlyError(e))}finally{setBusy(false)}}async function oauth(){try{const r=await api.req('/api/auth/oauth/github/start');if(r.enabled) location.href=r.authorize_url;else setErr(r.message)}catch(e){setErr(friendlyError(e))}}return <div className="loginPage"><section className="brandSide"><div className="brandTitle"><div className="logo"><span className="cross"></span><span>Hospital Management</span></div><h1>Modern care operations in one place.</h1><p>Manage patients, appointments, doctors, and medical records through a clean hospital dashboard.</p></div><p>Built for daily hospital workflow, team collaboration, and reliable patient record access.</p></section><section className="loginCard"><div className="authBox"><h2>{mode==='login'?'Welcome back':'Create account'}</h2><p className="sub">Sign in to continue to the hospital dashboard.</p>{err&&<div className={err.includes('successfully')?'notice ok':'notice err'}>{err.split('\n').map((x,i)=><div key={i}>{x}</div>)}</div>}<div className="tabs"><button className={mode==='login'?'active':''} onClick={()=>setMode('login')}>Login</button><button className={mode==='register'?'active':''} onClick={()=>setMode('register')}>Register</button></div><div className="form">{mode==='register'&&<Field label="Full name"><input value={f.full_name} onChange={e=>setF({...f,full_name:e.target.value})}/></Field>}<Field label="Email"><input value={f.email} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@example.com"/></Field><Field label="Password"><input type="password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} placeholder="Use a strong password"/></Field>{mode==='register'&&<Field label="Role"><select value={f.role} onChange={e=>setF({...f,role:e.target.value})}><option value="user">User</option><option value="admin">Admin</option></select></Field>}<button className="btn primary" disabled={busy} onClick={submit}>{busy?'Please wait...':mode==='login'?'Sign in':'Create account'}</button><button className="btn secondary" onClick={oauth}>Continue with GitHub</button></div></div></section></div>}
function Field({label,children}){return <div className="field"><label>{label}</label>{children}</div>}
function Page(p){return {overview:<Overview {...p}/>,patients:<Patients {...p}/>,appointments:<Appointments {...p}/>,records:<Records {...p}/>,admin:<Admin {...p}/>}[p.view]}
function Overview({user,data}){const stats=user.role==='admin'?[['Users',data.metrics.total_users||0],['Patients',data.metrics.patients||data.patients.length],['Appointments',data.metrics.appointments||data.appointments.length],['Records',data.metrics.records||data.records.length]]:[['My Patients',data.patients.length],['Appointments',data.appointments.length],['Medical Records',data.records.length],['Doctors',data.doctors.length]];return <><div className="hero"><div><h1>Good day, {user.full_name||user.email}</h1><p>Here is the current hospital activity summary.</p></div></div><div className="grid">{stats.map(([a,b])=><div className="card stat" key={a}><small>{a}</small><strong>{b}</strong></div>)}</div><div className="two"><Table title="Recent Patients" rows={data.patients.slice(0,5)}/><Table title="Upcoming Appointments" rows={data.appointments.slice(0,5)}/></div></>}
function Patients({data,load,setMsg,setErr}){const [f,setF]=useState({full_name:'',age:30,gender:'Male',phone:'',diagnosis:''});async function create(){try{setErr('');await api.req('/api/patients/',{method:'POST',body:JSON.stringify({...f,age:Number(f.age)})});setMsg('Patient profile created successfully.');setF({...f,full_name:'',phone:'',diagnosis:''});load()}catch(e){setErr(friendlyError(e))}}return <div className="two"><div className="card"><h3>Add Patient</h3><div className="form"><Field label="Full name"><input value={f.full_name} onChange={e=>setF({...f,full_name:e.target.value})}/></Field><Field label="Age"><input type="number" value={f.age} onChange={e=>setF({...f,age:e.target.value})}/></Field><Field label="Gender"><select value={f.gender} onChange={e=>setF({...f,gender:e.target.value})}><option>Male</option><option>Female</option><option>Other</option></select></Field><Field label="Phone"><input value={f.phone} onChange={e=>setF({...f,phone:e.target.value})}/></Field><Field label="Diagnosis"><textarea rows="4" value={f.diagnosis} onChange={e=>setF({...f,diagnosis:e.target.value})}/></Field><button className="btn primary" onClick={create}>Save Patient</button></div></div><Table title="Patients" rows={data.patients}/></div>}
function Appointments({data,load,setMsg,setErr}){const [f,setF]=useState({patient_id:'',doctor_id:'',appointment_time:'',reason:''});async function create(){try{setErr('');await api.req('/api/patients/appointments',{method:'POST',body:JSON.stringify({patient_id:Number(f.patient_id),doctor_id:f.doctor_id?Number(f.doctor_id):null,appointment_time:f.appointment_time,reason:f.reason})});setMsg('Appointment scheduled successfully.');setF({patient_id:'',doctor_id:'',appointment_time:'',reason:''});load()}catch(e){setErr(friendlyError(e))}}return <div className="two"><div className="card"><h3>Schedule Appointment</h3><div className="form"><Field label="Patient"><select value={f.patient_id} onChange={e=>setF({...f,patient_id:e.target.value})}><option value="">Choose patient</option>{data.patients.map(p=><option value={p.id} key={p.id}>{p.full_name}</option>)}</select></Field><Field label="Doctor"><select value={f.doctor_id} onChange={e=>setF({...f,doctor_id:e.target.value})}><option value="">Choose doctor</option>{data.doctors.map(d=><option value={d.id} key={d.id}>{d.full_name} - {d.specialty}</option>)}</select></Field><Field label="Date and time"><input type="datetime-local" value={f.appointment_time} onChange={e=>setF({...f,appointment_time:e.target.value})}/></Field><Field label="Reason"><textarea rows="4" value={f.reason} onChange={e=>setF({...f,reason:e.target.value})}/></Field><button className="btn primary" onClick={create}>Schedule</button></div></div><Table title="Appointments" rows={data.appointments}/></div>}
function Records({data,load,setMsg,setErr}){const [patient,setPatient]=useState(''),[file,setFile]=useState(null),[checks,setChecks]=useState({});async function upload(){try{setErr('');const fd=new FormData();fd.append('patient_id',patient);fd.append('file',file);await api.req('/api/records/upload',{method:'POST',body:fd});setMsg('Medical record uploaded successfully.');setFile(null);load()}catch(e){setErr(friendlyError(e))}}async function verify(id){try{setErr('');const v=await api.req('/api/records/verify/'+id);setChecks({...checks,[id]:v})}catch(e){setErr(friendlyError(e))}}function download(id){window.open('/api/records/download/'+id+'?token='+api.token(),'_blank')}return <><div className="card"><h3>Upload Medical Record</h3><div className="row"><div className="field" style={{minWidth:260}}><label>Patient</label><select value={patient} onChange={e=>setPatient(e.target.value)}><option value="">Choose patient</option>{data.patients.map(p=><option value={p.id} key={p.id}>{p.full_name}</option>)}</select></div><div className="field" style={{minWidth:280}}><label>File</label><input type="file" onChange={e=>setFile(e.target.files[0])}/></div><button className="btn primary" onClick={upload}>Upload</button></div></div><div className="card"><div className="sectionTitle"><h3>Medical Records</h3><span className="muted">{data.records.length} records</span></div>{!data.records.length?<div className="empty">No medical records available.</div>:<div className="tableWrap"><table><thead><tr><th>ID</th><th>Patient</th><th>File</th><th>Size</th><th>Status</th><th>Record Check</th><th>Actions</th></tr></thead><tbody>{data.records.map(r=>{const c=checks[r.id];return <tr key={r.id}><td>{r.id}</td><td>{r.patient_id}</td><td>{r.filename}</td><td>{r.file_size} bytes</td><td><span className="pill ok">{r.status}</span></td><td>{c?<span className={'pill '+(c.valid?'ok':'bad')}>{c.valid?'Valid':'Invalid'}</span>:<span className="muted">Not checked</span>}</td><td className="row"><button className="btn ghost" onClick={()=>verify(r.id)}>Check</button></td></tr>})}</tbody></table></div>}</div></>}
function Admin({data,load,setMsg,setErr}){const [d,setD]=useState({full_name:'',specialty:'',phone:''});async function create(){try{setErr('');await api.req('/api/patients/doctors',{method:'POST',body:JSON.stringify(d)});setMsg('Doctor added successfully.');setD({full_name:'',specialty:'',phone:''});load()}catch(e){setErr(friendlyError(e))}}return <div className="two"><div className="stack"><div className="card"><h3>Add Doctor</h3><div className="form"><Field label="Full name"><input value={d.full_name} onChange={e=>setD({...d,full_name:e.target.value})}/></Field><Field label="Specialty"><input value={d.specialty} onChange={e=>setD({...d,specialty:e.target.value})}/></Field><Field label="Phone"><input value={d.phone} onChange={e=>setD({...d,phone:e.target.value})}/></Field><button className="btn primary" onClick={create}>Save Doctor</button></div></div><Table title="Users" rows={data.users}/></div><Table title="Hospital Activity" rows={data.logs}/></div>}
function Table({title,rows=[]}){const keys=rows[0]?Object.keys(rows[0]).filter(k=>!['sha256','expected_sha256','actual_sha256'].includes(k)).slice(0,8):[];return <div className="card"><div className="sectionTitle"><h3>{title}</h3><span className="muted">{rows.length}</span></div>{!rows.length?<div className="empty">No data available.</div>:<div className="tableWrap"><table><thead><tr>{keys.map(k=><th key={k}>{k.replaceAll('_',' ')}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={i}>{keys.map(k=><td key={k}>{String(r[k]??'').length>80?String(r[k]).slice(0,80)+'...':String(r[k]??'')}</td>)}</tr>)}</tbody></table></div>}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
