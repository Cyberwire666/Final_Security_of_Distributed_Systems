<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure HMS Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --red:#d71920; --red2:#a90f16; --redSoft:#fff1f2; --redSoft2:#ffe3e6;
      --white:#ffffff; --ink:#17202a; --muted:#687385; --line:#eceff3;
      --panel:#ffffff; --bg:#f7f8fb; --shadow:0 24px 70px rgba(23,32,42,.10);
      --green:#0f9f6e; --amber:#b7791f; --blue:#2563eb; --radius:22px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:
      radial-gradient(circle at 0 0, rgba(215,25,32,.13), transparent 36%),
      linear-gradient(135deg,#fff 0%,#f7f8fb 50%,#fff5f6 100%);color:var(--ink)}
    button,input,select,textarea{font:inherit} button{transition:.18s ease} button:active{transform:scale(.98)}
    .loginShell{min-height:100vh;display:grid;place-items:center;padding:28px;position:relative;overflow:hidden}.loginShell:before{content:"";position:absolute;inset:auto -12% -20% auto;width:520px;height:520px;border-radius:999px;background:rgba(215,25,32,.09)}
    .loginCard{width:min(980px,100%);display:grid;grid-template-columns:1.05fr .95fr;background:rgba(255,255,255,.86);backdrop-filter:blur(16px);border:1px solid rgba(215,25,32,.12);box-shadow:var(--shadow);border-radius:34px;overflow:hidden}
    .loginBrand{padding:46px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;position:relative;overflow:hidden}.loginBrand:after{content:"+";position:absolute;right:32px;bottom:-50px;font-size:230px;font-weight:900;opacity:.13;line-height:1}.loginBrand .badge{width:66px;height:66px;border-radius:22px;background:#fff;color:var(--red);display:grid;place-items:center;font-size:34px;font-weight:1000;box-shadow:0 18px 40px rgba(0,0,0,.16)}
    .loginBrand h1{font-size:40px;line-height:1.06;margin:28px 0 14px;letter-spacing:-1.2px}.loginBrand p{font-size:16px;line-height:1.75;margin:0;color:rgba(255,255,255,.86)}.loginFeatures{display:grid;gap:12px;margin-top:28px}.loginFeatures span{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.16);padding:12px 14px;border-radius:16px;width:max-content;max-width:100%}
    .loginForm{padding:42px}.loginForm h2{margin:0 0 8px;font-size:26px}.loginForm p{margin:0 0 24px;color:var(--muted)}
    .app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:24px;background:#fff;border-right:1px solid var(--line);box-shadow:10px 0 40px rgba(23,32,42,.04)}
    .brand{display:flex;gap:13px;align-items:center;margin-bottom:24px}.mark{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--red),var(--red2));display:grid;place-items:center;color:white;font-size:28px;font-weight:1000;box-shadow:0 14px 32px rgba(215,25,32,.25)}.brand h2{margin:0;font-size:20px}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{display:grid;gap:8px}.nav button{cursor:pointer;border:1px solid transparent;background:transparent;color:#4a5568;text-align:left;border-radius:16px;padding:13px 14px;font-weight:750}.nav button:hover{background:var(--redSoft)}.nav button.active{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 12px 30px rgba(215,25,32,.22)}
    .sideCard{margin-top:22px;padding:16px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff,#fff7f8);color:var(--muted);line-height:1.55;font-size:13px}.sideCard b{color:var(--red)}
    .main{padding:26px 30px 34px;overflow:auto}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.title h1{margin:0;font-size:31px;letter-spacing:-.8px}.title p{margin:6px 0 0;color:var(--muted)}.profile{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:10px 12px;box-shadow:0 10px 28px rgba(23,32,42,.06)}.avatar{width:44px;height:44px;border-radius:16px;background:var(--redSoft);color:var(--red);display:grid;place-items:center;font-weight:1000}.profile strong{display:block}.profile span{display:block;font-size:12px;color:var(--muted);text-transform:capitalize}.logout{border:0;background:#111827;color:#fff;border-radius:14px;padding:10px 13px;font-weight:850;cursor:pointer}.oauthBtn{width:100%;margin-top:12px;border:1px solid #24292f;background:#24292f;color:#fff;border-radius:16px;padding:13px 14px;font-weight:950;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}.oauthBtn:hover{filter:brightness(1.05);box-shadow:0 14px 30px rgba(36,41,47,.18)}.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin:18px 0}.divider:before,.divider:after{content:'';height:1px;background:var(--line);flex:1}
    .hero{display:grid;grid-template-columns:1.4fr .6fr;gap:18px;margin-bottom:18px}.heroPanel{position:relative;overflow:hidden;border-radius:var(--radius);padding:26px;border:1px solid rgba(215,25,32,.12);background:linear-gradient(135deg,#fff,#fff6f7);box-shadow:var(--shadow)}.heroPanel:after{content:"";position:absolute;right:-40px;top:-50px;width:190px;height:190px;border-radius:999px;background:rgba(215,25,32,.09)}.heroPanel h2{margin:0;font-size:28px}.heroPanel p{color:var(--muted);line-height:1.65;margin:10px 0 0}.quick{display:grid;gap:10px}.quick .mini{padding:17px;border-radius:20px;background:#fff;border:1px solid var(--line);box-shadow:0 12px 30px rgba(23,32,42,.06)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px}.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}.row{display:grid;grid-template-columns:410px 1fr;gap:18px;align-items:start}.stack{display:grid;gap:15px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 16px 45px rgba(23,32,42,.07);padding:20px}.card h3{margin:0 0 14px;font-size:18px}.label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.metric{font-size:34px;font-weight:1000;margin-top:8px}.muted{color:var(--muted)}.small{font-size:12px}.section{margin-top:18px}
    input,select,textarea{width:100%;border:1px solid #e2e6ee;background:#fff;color:var(--ink);border-radius:15px;padding:12px 13px;outline:none;margin-bottom:10px}textarea{min-height:86px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:rgba(215,25,32,.42);box-shadow:0 0 0 4px rgba(215,25,32,.08)}
    .btns{display:flex;gap:10px;flex-wrap:wrap}.primary,.ghost,.dangerBtn,.warnBtn{border-radius:15px;padding:11px 14px;font-weight:900;cursor:pointer}.primary{border:0;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 12px 28px rgba(215,25,32,.24)}.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.ghost:hover{background:var(--redSoft)}.dangerBtn{background:#111827;color:#fff;border:0}.warnBtn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.primary:disabled{opacity:.6;cursor:not-allowed}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{color:#6b7280;background:#fafafa;text-transform:uppercase;letter-spacing:.06em;font-size:11px}td{color:#263241}.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;background:var(--redSoft);color:var(--red);border:1px solid var(--redSoft2);font-size:12px;font-weight:850}.pill.green{background:#ecfdf5;color:var(--green);border-color:#bbf7d0}.pill.blue{background:#eff6ff;color:var(--blue);border-color:#bfdbfe}.pill.dark{background:#111827;color:#fff;border-color:#111827}.hash{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#991b1b}.empty{padding:30px;text-align:center;color:var(--muted);background:#fafafa;border-radius:16px}.toast{margin:0 0 18px;padding:14px 16px;border-radius:16px;border:1px solid #fecdd3;background:#fff1f2;color:#991b1b}.toast.ok{border-color:#bbf7d0;background:#ecfdf5;color:#166534}.filebox{border:1px dashed rgba(215,25,32,.35);background:#fff7f8;border-radius:18px;padding:18px;margin-bottom:10px}.filebox input{border:0;background:transparent;margin:0;padding:0}.progress{height:8px;border-radius:99px;background:#f1f5f9;overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--red),#ff7a7a);width:72%}.fade{animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media(max-width:1120px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.hero,.row,.two{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.loginCard{grid-template-columns:1fr}.loginBrand{padding:30px}.main{padding:18px}.header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.profile{width:100%;justify-content:space-between}.title h1{font-size:25px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useEffect,useState}=React;

const api={
  token:()=>localStorage.getItem('token')||'',
  role:()=>localStorage.getItem('role')||'',
  user:()=>{try{return JSON.parse(localStorage.getItem('user')||'null')}catch{return null}},
  setSession(d){localStorage.setItem('token',d.access_token);localStorage.setItem('role',d.role||'user');},
  clear(){localStorage.removeItem('token');localStorage.removeItem('role');localStorage.removeItem('user');},
  headers(json=true){const h={}; if(json) h['Content-Type']='application/json'; if(this.token()) h['Authorization']='Bearer '+this.token(); return h;},
  async req(url,opt={}){const res=await fetch(url,{...opt,headers:{...this.headers(!(opt.body instanceof FormData)),...(opt.headers||{})}}); const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch{data=text} if(!res.ok) throw new Error((data&&data.detail)||data||res.statusText); return data;},
  async upload(url,fd){const res=await fetch(url,{method:'POST',headers:this.headers(false),body:fd}); const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch{data=text} if(!res.ok) throw new Error((data&&data.detail)||data||res.statusText); return data;},
  async download(record){const res=await fetch('/api/records/download/'+record.id,{headers:this.headers(false)}); if(!res.ok){let d;try{d=await res.json()}catch{};throw new Error((d&&d.detail)||'download failed')} const blob=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=record.filename||('record-'+record.id); document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);}
};

function App(){
 const [auth,setAuth]=useState(!!api.token());
 const [view,setView]=useState('dashboard');
 const [msg,setMsg]=useState('');
 const [err,setErr]=useState('');
 const [data,setData]=useState({metrics:{},me:api.user(),patients:[],doctors:[],appointments:[],records:[],logs:[],users:[]});
 async function load(){
   if(!api.token()) return;
   setErr('');
   try{
    const me=await api.req('/api/auth/me');
    localStorage.setItem('user',JSON.stringify(me));
    const [patients,doctors,appointments,records]=await Promise.all([
      api.req('/api/patients/'),
      api.req('/api/patients/doctors/list'),
      api.req('/api/patients/appointments/list'),
      api.req('/api/records/')
    ]);
    let metrics={},logs=[],users=[];
    if(me.role==='admin'){
      [metrics,logs,users]=await Promise.all([
        api.req('/api/audit/metrics'),
        api.req('/api/audit/logs'),
        api.req('/api/auth/admin/users')
      ]);
    }
    setData({metrics,me,patients,doctors,appointments,records,logs,users});
   }catch(e){setErr(e.message); if(String(e.message).toLowerCase().includes('token')){api.clear();setAuth(false)}}
 }
 useEffect(()=>{load()},[auth]);
 if(!auth) return <LoginScreen setAuth={setAuth} setMsg={setMsg} setErr={setErr} msg={msg} err={err}/>;
 const nav=[['dashboard','Overview'],['patients','Patients'],['appointments','Appointments'],['records','Records'],['admin','Admin Center'],['security','Security Demo']];
 return <div className="app">
  <aside className="side">
    <div className="brand"><div className="mark">+</div><div><h2>Secure HMS</h2><p>Ambulance Command UI</p></div></div>
    <div className="nav">{nav.map(n=><button key={n[0]} className={view===n[0]?'active':''} onClick={()=>setView(n[0])}>{n[1]}</button>)}</div>
    <div className="sideCard"><b>Secure mode:</b><br/>The dashboard uses the logged-in JWT only. Internal service keys remain server-side through environment variables.</div>
  </aside>
  <main className="main">
    <Header me={data.me} setAuth={setAuth} setMsg={setMsg}/>
    {msg&&<div className="toast ok">{msg}</div>}{err&&<div className="toast">{err}</div>}
    <div className="fade">
      {view==='dashboard'&&<Dashboard data={data} load={load}/>} 
      {view==='patients'&&<Patients rows={data.patients} load={load} setMsg={setMsg} setErr={setErr}/>} 
      {view==='appointments'&&<Appointments patients={data.patients} doctors={data.doctors} rows={data.appointments} load={load} setMsg={setMsg} setErr={setErr}/>} 
      {view==='records'&&<Records patients={data.patients} records={data.records} load={load} setMsg={setMsg} setErr={setErr}/>} 
      {view==='admin'&&<Admin data={data} load={load} setMsg={setMsg} setErr={setErr}/>} 
      {view==='security'&&<Security records={data.records} load={load} setMsg={setMsg} setErr={setErr}/>} 
    </div>
  </main>
 </div>
}

function LoginScreen({setAuth,setMsg,setErr,msg,err}){
 const [email,setEmail]=useState('admin@test.com'),[password,setPassword]=useState('Admin123!'),[full_name,setName]=useState('Admin User'),[role,setRole]=useState('admin'),[mode,setMode]=useState('login'),[busy,setBusy]=useState(false);
 async function login(){try{setBusy(true);setErr('');const d=await api.req('/api/auth/login',{method:'POST',body:JSON.stringify({email,password})});api.setSession(d);const me=await api.req('/api/auth/me');localStorage.setItem('user',JSON.stringify(me));setMsg('Welcome back, '+(me.full_name||me.email));setAuth(true)}catch(e){setErr(e.message)}finally{setBusy(false)}}
 async function register(){try{setBusy(true);setErr('');await api.req('/api/auth/register',{method:'POST',body:JSON.stringify({email,password,full_name,role})});setMsg('Account created. You can login now.');setMode('login')}catch(e){setErr(e.message)}finally{setBusy(false)}}
 async function githubOAuth(){try{setBusy(true);setErr('');const d=await api.req('/api/auth/oauth/github/start');if(!d.enabled){setErr(d.message+' Callback URL: '+d.github_callback_url);return;}window.location.href=d.authorize_url;}catch(e){setErr(e.message)}finally{setBusy(false)}}
 return <div className="loginShell"><div className="loginCard"><section className="loginBrand"><div className="badge">+</div><h1>Secure Hospital Management System</h1><p>Ambulance red and white professional dashboard for admins and users, secured by JWT, RBAC, HTTPS, PostgreSQL, RabbitMQ, encrypted uploads, and audit tracking.</p><div className="loginFeatures"><span>Emergency-style operation center</span><span>Admin/User access control</span><span>Encrypted medical records</span></div></section><section className="loginForm"><h2>{mode==='login'?'Sign in':'Create account'}</h2><p>{mode==='login'?'Use your hospital account to continue.':'Create an admin or user account for testing.'}</p>{msg&&<div className="toast ok">{msg}</div>}{err&&<div className="toast">{err}</div>}<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email"/><input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password" type="password"/>{mode==='register'&&<><input value={full_name} onChange={e=>setName(e.target.value)} placeholder="Full name"/><select value={role} onChange={e=>setRole(e.target.value)}><option value="admin">admin</option><option value="user">user</option></select></>}<div className="btns"><button className="primary" disabled={busy} onClick={mode==='login'?login:register}>{busy?'Please wait...':(mode==='login'?'Login':'Register')}</button><button className="ghost" onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create new account':'Back to login'}</button></div>{mode==='login'&&<><div className="divider">or</div><button className="oauthBtn" disabled={busy} onClick={githubOAuth}>Continue with GitHub OAuth</button><p className="muted small" style={{marginTop:'10px'}}>OAuth returns a JWT and opens the dashboard automatically.</p></>}</section></div></div>
}
function Header({me,setAuth,setMsg}){const name=(me&&me.full_name)||((me&&me.email)||'User');const role=(me&&me.role)||api.role();return <div className="header"><div className="title"><h1>{role==='admin'?'Admin Command Center':'User Workspace'}</h1><p>Manage patients, appointments, records, audit activity, and security demonstrations.</p></div><div className="profile"><div className="avatar">{name.charAt(0).toUpperCase()}</div><div><strong>{name}</strong><span>{role||'user'}</span></div><button className="logout" onClick={()=>{api.clear();setAuth(false);setMsg('Logged out successfully')}}>Logout</button></div></div>}
function Dashboard({data,load}){const m=data.metrics||{}; const cards=[['Users',m.total_users],['Active Users',m.active_users],['Patients',m.patients??data.patients.length],['Doctors',m.doctors??data.doctors.length],['Appointments',m.appointments??data.appointments.length],['Records',m.records??data.records.length],['Processed Jobs',m.processed_jobs],['Failed Logins',m.failed_logins]];return <><div className="hero"><div className="heroPanel"><h2>Emergency-ready hospital operations</h2><p>A cleaner dashboard for your distributed security project: fast overview, protected APIs, RBAC, encrypted records, integrity verification, and audit visibility.</p></div><div className="quick"><div className="mini"><span className="pill green">HTTPS Active</span><p className="muted small">Nginx gateway terminates TLS.</p></div><div className="mini"><span className="pill">JWT Protected</span><p className="muted small">No login panel after authentication.</p></div></div></div><div className="grid">{cards.map(([k,v])=><div className="card" key={k}><div className="label">{k}</div><div className="metric">{v??'--'}</div><div className="progress"><span></span></div></div>)}</div><div className="two section"><div className="card"><h3>System Health</h3><p><span className="pill">Nginx API Gateway</span> <span className="pill green">PostgreSQL</span> <span className="pill blue">RabbitMQ</span></p><p className="muted">All dashboard calls go through protected API routes using the current JWT.</p><button className="primary" onClick={load}>Refresh Dashboard</button></div><div className="card"><h3>Demo Flow</h3><p className="muted">Login → Create Patient → Book Appointment → Upload encrypted record → Worker processes job → Verify SHA-256 → Review audit logs.</p></div></div></>}
function Patients({rows,load,setMsg,setErr}){const [f,setF]=useState({full_name:'Ahmed Ali',age:30,gender:'male',phone:'01000000000',diagnosis:'Initial diagnosis'}); async function create(){try{setErr('');await api.req('/api/patients/',{method:'POST',body:JSON.stringify(f)});setMsg('Patient created');load()}catch(e){setErr(e.message)}}return <div className="row"><div className="card"><h3>Create Patient</h3><input value={f.full_name} onChange={e=>setF({...f,full_name:e.target.value})} placeholder="Full name"/><input type="number" value={f.age} onChange={e=>setF({...f,age:Number(e.target.value)})} placeholder="Age"/><select value={f.gender} onChange={e=>setF({...f,gender:e.target.value})}><option>male</option><option>female</option><option>unknown</option></select><input value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} placeholder="Phone"/><textarea value={f.diagnosis} onChange={e=>setF({...f,diagnosis:e.target.value})} placeholder="Diagnosis"/><button className="primary" onClick={create}>Save Patient</button></div><Table title="Patients" rows={rows}/></div>}
function Appointments({patients,doctors,rows,load,setMsg,setErr}){const [f,setF]=useState({patient_id:'',doctor_id:'',appointment_time:'',reason:'Follow-up visit'}); async function create(){try{setErr('');if(!f.patient_id) throw new Error('Select patient first');await api.req('/api/patients/appointments',{method:'POST',body:JSON.stringify({patient_id:Number(f.patient_id),doctor_id:f.doctor_id?Number(f.doctor_id):null,appointment_time:f.appointment_time,reason:f.reason})});setMsg('Appointment booked');load()}catch(e){setErr(e.message)}}return <div className="row"><div className="card"><h3>Book Appointment</h3><select value={f.patient_id} onChange={e=>setF({...f,patient_id:e.target.value})}><option value="">Select patient</option>{patients.map(p=><option key={p.id} value={p.id}>#{p.id} - {p.full_name}</option>)}</select><select value={f.doctor_id} onChange={e=>setF({...f,doctor_id:e.target.value})}><option value="">Select doctor</option>{doctors.map(d=><option key={d.id} value={d.id}>{d.full_name} · {d.specialty}</option>)}</select><input type="datetime-local" value={f.appointment_time} onChange={e=>setF({...f,appointment_time:e.target.value})}/><textarea value={f.reason} onChange={e=>setF({...f,reason:e.target.value})}/><button className="primary" onClick={create}>Book Appointment</button></div><Table title="Appointments" rows={rows}/></div>}
function Records({patients,records,load,setMsg,setErr}){const [patient,setPatient]=useState(''),[file,setFile]=useState(null),[busy,setBusy]=useState(false); async function upload(){try{setErr('');if(!patient) throw new Error('Select patient first');if(!file) throw new Error('Select a file first');setBusy(true);const fd=new FormData();fd.append('patient_id',patient);fd.append('file',file);const d=await api.upload('/api/records/upload',fd);setMsg('Upload success. SHA-256: '+d.sha256);setFile(null);load()}catch(e){setErr(e.message)}finally{setBusy(false)}} async function verify(id){try{const d=await api.req('/api/records/verify/'+id);setMsg('Integrity valid: '+d.valid+' | SHA: '+(d.actual_sha256||d.expected_sha256))}catch(e){setErr(e.message)}} async function down(r){try{await api.download(r);setMsg('Downloaded '+r.filename)}catch(e){setErr(e.message)}} return <div className="row"><div className="card"><h3>Secure Medical Record Upload</h3><select value={patient} onChange={e=>setPatient(e.target.value)}><option value="">Select patient</option>{patients.map(p=><option key={p.id} value={p.id}>#{p.id} - {p.full_name}</option>)}</select><div className="filebox"><input type="file" accept=".pdf,.png,.jpg,.jpeg,.txt" onChange={e=>setFile(e.target.files[0]||null)}/></div><p className="muted small">Allowed: PDF, PNG, JPG, JPEG, TXT. Files are encrypted before storage.</p><button className="primary" disabled={busy} onClick={upload}>{busy?'Uploading...':'Upload Encrypted File'}</button></div><div className="card"><h3>Medical Records</h3>{!records.length?<div className="empty">No records yet</div>:<table><thead><tr><th>ID</th><th>Patient</th><th>File</th><th>Status</th><th>SHA-256</th><th>Actions</th></tr></thead><tbody>{records.map(r=><tr key={r.id}><td>{r.id}</td><td>{r.patient_id}</td><td>{r.filename}<br/><span className="muted small">{r.content_type} · {r.file_size} bytes</span></td><td><span className="pill blue">{r.status}</span></td><td><span className="hash">{String(r.sha256).slice(0,18)}...</span></td><td><div className="btns"><button className="ghost" onClick={()=>verify(r.id)}>Verify</button><button className="ghost" onClick={()=>down(r)}>Download</button></div></td></tr>)}</tbody></table>}</div></div>}
function Admin({data,load,setMsg,setErr}){const [d,setD]=useState({full_name:'Dr. New Doctor',specialty:'Emergency',phone:'01000000000'}); async function doc(){try{setErr('');await api.req('/api/patients/doctors',{method:'POST',body:JSON.stringify(d)});setMsg('Doctor added');load()}catch(e){setErr(e.message)}} if((data.me||{}).role!=='admin') return <div className="card"><h3>Admin only</h3><p className="muted">Login with an admin account to access users, audit logs and doctor management.</p></div>; return <div className="two"><div className="stack"><div className="card"><h3>Add Doctor</h3><input value={d.full_name} onChange={e=>setD({...d,full_name:e.target.value})}/><input value={d.specialty} onChange={e=>setD({...d,specialty:e.target.value})}/><input value={d.phone} onChange={e=>setD({...d,phone:e.target.value})}/><button className="primary" onClick={doc}>Create Doctor</button></div><Table title="Users" rows={data.users}/></div><Table title="Audit Logs" rows={data.logs}/></div>}
function Security({records,load,setMsg,setErr}){async function tamper(){try{setErr('');if(!records.length) throw new Error('Upload a record first');const r=records[0];await api.req('/api/records/admin/tamper/'+r.id,{method:'POST'});const v=await api.req('/api/records/verify/'+r.id);setMsg('Tamper demo completed. Integrity valid should be false: '+v.valid);load()}catch(e){setErr(e.message)}}return <div className="grid"><div className="card"><h3>Invalid JWT Test</h3><p className="muted">In Postman, send any protected route with a fake bearer token. Expected: 401 Unauthorized.</p></div><div className="card"><h3>RBAC Test</h3><p className="muted">Login as user and open Admin Center. Expected: admin-only access denied.</p></div><div className="card"><h3>Rate Limit Test</h3><p className="muted">Send many login requests quickly. Nginx should block excessive traffic.</p></div><div className="card"><h3>File Integrity Attack</h3><p className="muted">Admin can tamper a stored encrypted file for demo, then verification fails.</p><button className="warnBtn" onClick={tamper}>Tamper Latest Record</button></div></div>}
function Table({title,rows=[]}){const keys=rows[0]?Object.keys(rows[0]).slice(0,8):[];return <div className="card"><h3>{title}</h3>{!rows.length?<div className="empty">No data available</div>:<table><thead><tr>{keys.map(k=><th key={k}>{k}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={i}>{keys.map(k=><td key={k}>{String(r[k]??'').length>90?String(r[k]).slice(0,90)+'...':String(r[k]??'')}</td>)}</tr>)}</tbody></table>}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
